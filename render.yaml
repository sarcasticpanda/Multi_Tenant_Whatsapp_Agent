# Render blueprint — deploys the FastAPI backend as a Docker web service.
# Create the env vars (marked sync:false) in the Render dashboard after import.
services:
  - type: web
    name: whatsapp-agent-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: whatsapp_agent
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false   # set to https://<your-app>.onrender.com after first deploy
